system:
  output_dir: outputs

portfolio:
  symbols: [SPY, QQQ, IWM, TLT, GLD]
  start_date: '2020-01-01'
  end_date: null
  lookback_days: 126
  max_weight: 0.30
  gross_limit: 1.00
  rebalance_every_n_days: 5

costs:
  transaction_cost_bps: 5
  slippage_bps: 2

risk:
  target_annual_vol: 0.15
  min_annual_vol_floor: 0.10

agent:
  enable_ollama_overlay: false
  enable_llm_research: false
  ollama_model: llama3.1:8b
  ollama_url: http://localhost:11434/api/generate
  max_headlines: 0
  max_news_age_minutes: 15
  max_retries: 1
  retry_base_delay_sec: 0.2

strategies:
  weights:
    trend_following: 0.30
    mean_reversion: 0.20
    volatility_carry: 0.15
    regime_switching: 0.20
    event_driven: 0.15

alpha_pipeline:
  blend_weight: 0.0

arbitrage:
  blend_weight: 0.10

microstructure:
  blend_weight: 0.05
  enabled: true

research_council:
  enabled: false
  blend_weight: 0.0
  max_rounds: 1
  request_timeout_sec: 3

learning:
  enabled: true
  decay: 0.95
  min_weight: 0.05
  dynamic_min_weight: 0.05
  dynamic_max_weight: 0.45
  dynamic_smoothing: 0.30
  quality_eval_days: 60

execution_controls:
  min_weight_change_to_trade: 0.02
  max_turnover_per_cycle: 0.40
  rebalance_cooldown_cycles: 1

private_alpha:
  blend_weight: 0.0

benchmark:
  mode: symbol
  symbol: SPY
  alpha_weight: 0.20

fund_manager:
  turnover_penalty: 1.20
  risk_penalty_scale: 0.50

regime_controls:
  defensive_assets: [TLT, GLD]
  defensive_tilt: 0.10
  gross_limit_by_regime:
    trend: 1.00
    meanrev: 0.80
    stress: 0.40
  strategy_weights_by_regime:
    trend:
      trend_following: 0.45
      mean_reversion: 0.10
      volatility_carry: 0.10
      regime_switching: 0.25
      event_driven: 0.10
    meanrev:
      trend_following: 0.15
      mean_reversion: 0.35
      volatility_carry: 0.25
      regime_switching: 0.20
      event_driven: 0.05
    stress:
      trend_following: 0.10
      mean_reversion: 0.20
      volatility_carry: 0.35
      regime_switching: 0.30
      event_driven: 0.05

risk_hard_limits:
  max_weight: 0.30
  gross_limit: 1.00
  net_limit: 0.30
  max_annual_vol: 0.20
  drawdown_brake: 0.15
  brake_scale: 0.50
  var_limit_95: 0.03
  es_limit_95: 0.04
  concentration_top1_limit: 0.30
  concentration_top5_limit: 0.80
  beta_neutral_band: 0.20
  jump_threshold: 0.06
  max_leverage_by_regime:
    trend: 3.0
    meanrev: 2.5
    volatility_carry: 8.0
    stress: 1.0

data_quality:
  max_nan_ratio: 0.01
  max_abs_daily_return: 0.30
  max_zero_price_ratio: 0.0
  max_staleness_minutes: 9999999

resilience:
  failure_threshold: 3
  recovery_timeout_sec: 120
  degraded_mode_enabled: true

health:
  deadman_timeout_sec: 900

alerts:
  enabled: false
  slack_webhook: ''
  thresholds:
    daily_pnl_drift: 0.03
    strategy_disagreement: 0.70

tracing:
  enabled: false

backtest:
  fast_mode: true

execution:
  broker: stub
  primary_broker: stub
  backup_brokers: [stub]
  market_mode: us
